name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create public release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="artifacts/codex-web-manager-${version}-win-x64.zip"
          notes="notes/${GITHUB_REF_NAME}.md"
          test -f "$asset"
          if [[ -f "$notes" ]]; then
            gh release create "$GITHUB_REF_NAME" "$asset" --title "Codex Web Manager ${GITHUB_REF_NAME}" --notes-file "$notes" --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" "$asset" --title "Codex Web Manager ${GITHUB_REF_NAME}" --generate-notes --verify-tag
          fi